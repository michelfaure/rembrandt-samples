# GitHub Actions excerpt — to merge into your .github/workflows/ci.yml
#
# Two jobs:
#   - log-main: on push to main, traces the ratio in the logs for history
#   - check-pr: on PR, blocks if the ratio regresses

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  glue-ratio-log:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log glue ratio
        run: bash scripts/glue-ratio.sh

  glue-ratio-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 and the base ref are required so that
          # glue-ratio-check.sh can extract lib/ from origin/main
          fetch-depth: 0
      - name: Fetch base ref
        run: git fetch origin main --depth=1
      - name: Check no regression
        env:
          TOLERANCE: "0"
          BASE_REF: "origin/main"
        run: bash scripts/glue-ratio-check.sh
